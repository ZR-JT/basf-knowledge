name: Scrape BASF Knowledgebase

on:
  schedule:
    - cron: '0 2 * * 1'   # Jeden Montag um 02:00 UTC (wöchentlich reicht für KB)
  workflow_dispatch:        # Auch manuell startbar

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python Setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Abhaengigkeiten installieren
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Scraper ausfuehren
        run: python scraper.py

      - name: Dateien committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          touch .nojekyll
          git add .nojekyll index.html kb/
          git diff --staged --quiet || git commit -m "Update knowledgebase $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
